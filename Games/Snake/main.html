<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Snake</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#07110b;color:white}
    body{background:radial-gradient(circle at top left,#1f8f4a55,transparent 420px),radial-gradient(circle at top right,#2088ff44,transparent 380px),#07110b;overflow-x:hidden}
    .wrap{width:min(1100px,calc(100% - 24px));margin:0 auto;padding:14px 0;display:grid;gap:12px;min-height:100vh}
    header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px;border:1px solid #ffffff22;border-radius:22px;background:#ffffff12;backdrop-filter:blur(12px)}
    h1{margin:0;font-size:clamp(28px,5vw,46px);letter-spacing:-.05em}.sub{color:#b6d8c2;font-weight:700;margin-top:4px}.scores{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.score{padding:9px 12px;border-radius:999px;background:#00000035;border:1px solid #ffffff20;font-weight:900}.green{color:#4dff8b}.blue{color:#56c7ff}.best{color:#ffd166}
    .game{position:relative;display:grid;place-items:center;padding:12px;border:1px solid #ffffff22;border-radius:24px;background:#00000030;min-height:0}
    canvas{width:min(82vmin,720px);height:min(82vmin,720px);max-width:100%;display:block;border-radius:18px;background:#08150d;box-shadow:0 20px 70px #0008;touch-action:none}
    .overlay{position:absolute;inset:12px;display:grid;place-items:center;border-radius:20px;background:#001006aa;backdrop-filter:blur(10px);z-index:5}.hide{display:none!important}
    .card{width:min(560px,calc(100% - 24px));padding:24px;border-radius:24px;background:#102016ee;border:1px solid #ffffff26;box-shadow:0 25px 80px #0009;text-align:center}.card h2{font-size:clamp(38px,9vw,72px);line-height:.9;margin:0 0 10px;letter-spacing:-.07em}.card p{color:#b6d8c2;font-weight:700;line-height:1.45}.field{text-align:left;margin-top:14px}.field>label{display:block;margin:0 0 8px 4px;font-weight:900;color:#dcffe8}
    .modes{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mode{border:1px solid #ffffff22;border-radius:16px;background:#ffffff12;color:white;padding:14px 8px;cursor:pointer;font-weight:950}.mode.active{background:linear-gradient(135deg,#37ff8750,#56c7ff35);border-color:#4dff8b}.mode small{display:block;color:#b6d8c2;margin-top:4px;font-weight:700}
    select{width:100%;height:50px;border-radius:16px;border:1px solid #ffffff22;background:#07110b;color:white;padding:0 14px;font-weight:900;font-size:16px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.btn{border:0;border-radius:999px;min-height:50px;padding:12px 18px;cursor:pointer;background:linear-gradient(135deg,#4dff8b,#56c7ff);color:#031008;font-weight:1000;font-size:16px}.btn2{background:#ffffff14;color:white;border:1px solid #ffffff22}.help{display:none;text-align:left;color:#c8efd4;margin-top:14px;font-weight:750;line-height:1.55}.help.show{display:block}
    .touch{display:none;grid-template-columns:68px 68px 68px;grid-template-rows:56px 56px;gap:8px;justify-content:center}.dir{border-radius:16px;border:1px solid #ffffff22;background:#ffffff14;color:white;font-weight:1000;font-size:22px}.up{grid-column:2}.left{grid-column:1;grid-row:2}.down{grid-column:2;grid-row:2}.right{grid-column:3;grid-row:2}
    @media(max-width:760px){header{align-items:flex-start}.scores{max-width:165px}.score{font-size:13px;padding:7px 9px}.modes{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.touch{display:grid}canvas{width:calc(100vw - 48px);height:calc(100vw - 48px)}}
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div><h1>🐍 Snake</h1><div id="status" class="sub">Wähle einen Modus und starte.</div></div>
      <div class="scores">
        <div class="score">Grün: <span id="s1" class="green">0</span></div>
        <div id="s2box" class="score">Blau: <span id="s2" class="blue">0</span></div>
        <div class="score">Best: <span id="best" class="best">0</span></div>
      </div>
    </header>

    <section class="game">
      <canvas id="c" width="720" height="720"></canvas>

      <div id="menu" class="overlay">
        <div class="card">
          <h2>Snake</h2>
          <p>Friss Äpfel, wachse und überlebe so lange wie möglich.</p>
          <div class="field">
            <label>Modus</label>
            <div class="modes">
              <button type="button" class="mode active" data-mode="single">Singleplayer<small>Alleine</small></button>
              <button type="button" class="mode" data-mode="bot">Gegen Bot<small>Du vs KI</small></button>
              <button type="button" class="mode" data-mode="multi">Multiplayer<small>Lokal</small></button>
            </div>
          </div>
          <div class="field">
            <label for="diff">Schwierigkeit</label>
            <select id="diff">
              <option value="easy">Leicht</option>
              <option value="normal" selected>Normal</option>
              <option value="hard">Schwer</option>
              <option value="insane">Extrem</option>
            </select>
          </div>
          <div class="actions">
            <button type="button" id="start" class="btn">Starten</button>
            <button type="button" id="helpBtn" class="btn btn2">Steuerung</button>
          </div>
          <div id="help" class="help">
            Grün: Pfeiltasten oder Touch<br>
            Blau: W, A, S, D<br>
            Pause: Leertaste
          </div>
        </div>
      </div>

      <div id="over" class="overlay hide">
        <div class="card">
          <h2 id="overTitle">Game Over</h2>
          <p id="overText">Punkte</p>
          <div class="actions">
            <button type="button" id="again" class="btn">Nochmal</button>
            <button type="button" id="back" class="btn btn2">Menü</button>
          </div>
        </div>
      </div>
    </section>

    <section class="touch">
      <button type="button" class="dir up" data-d="up">▲</button>
      <button type="button" class="dir left" data-d="left">◀</button>
      <button type="button" class="dir down" data-d="down">▼</button>
      <button type="button" class="dir right" data-d="right">▶</button>
    </section>
  </main>

<script>
(() => {
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  const N=24, CELL=canvas.width/N;
  const menu=document.getElementById('menu'), over=document.getElementById('over');
  const start=document.getElementById('start'), again=document.getElementById('again'), back=document.getElementById('back');
  const status=document.getElementById('status'), diffSel=document.getElementById('diff');
  const s1=document.getElementById('s1'), s2=document.getElementById('s2'), s2box=document.getElementById('s2box'), bestEl=document.getElementById('best');
  const overTitle=document.getElementById('overTitle'), overText=document.getElementById('overText');
  const help=document.getElementById('help'), helpBtn=document.getElementById('helpBtn');
  const speeds={easy:150,normal:105,hard:75,insane:52};
  const walls={easy:false,normal:true,hard:true,insane:true};
  const botError={easy:.28,normal:.15,hard:.07,insane:.02};
  let mode='single', snake=[], food={x:10,y:10}, timer=null, running=false, paused=false;
  let best=Number(safeGet('snake_best')||0); bestEl.textContent=best;
  function safeGet(key){try{return localStorage.getItem(key)}catch(e){return null}}
  function safeSet(key,value){try{localStorage.setItem(key,value)}catch(e){}}

  document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('active',x===b));});
  helpBtn.onclick=()=>help.classList.toggle('show');
  start.onclick=()=>startGame(); again.onclick=()=>startGame(); back.onclick=()=>showMenu();

  function newSnake(name,color,head,body,dir,bot=false){return{name,color,head,body:body.map(p=>({...p})),dir:{...dir},next:{...dir},score:0,alive:true,grow:0,bot};}
  function reset(){
    snake=[newSnake('Grün','#4dff8b','#dfffea',[{x:7,y:12},{x:6,y:12},{x:5,y:12}],{x:1,y:0})];
    if(mode==='bot') snake.push(newSnake('Bot','#56c7ff','#e4f8ff',[{x:16,y:11},{x:17,y:11},{x:18,y:11}],{x:-1,y:0},true));
    if(mode==='multi') snake.push(newSnake('Blau','#56c7ff','#e4f8ff',[{x:16,y:11},{x:17,y:11},{x:18,y:11}],{x:-1,y:0}));
    s2box.style.display=mode==='single'?'none':'block'; spawnFood(); update(); draw();
  }
  function startGame(){reset();menu.classList.add('hide');over.classList.add('hide');running=true;paused=false;status.textContent=labelMode()+' · '+labelDiff();clearInterval(timer);timer=setInterval(tick,speeds[diffSel.value]);canvas.focus();}
  function showMenu(){running=false;clearInterval(timer);over.classList.add('hide');menu.classList.remove('hide');status.textContent='Wähle einen Modus und starte.';reset();}
  function labelMode(){return mode==='single'?'Singleplayer':mode==='bot'?'Gegen Bot':'Multiplayer'}
  function labelDiff(){return diffSel.options[diffSel.selectedIndex].text}

  function tick(){if(!running||paused)return; snake.forEach(sn=>{if(sn.alive&&sn.bot)botMove(sn)}); snake.forEach(sn=>{if(sn.alive)sn.dir={...sn.next}});
    const nextHeads=new Map();
    snake.forEach(sn=>{if(!sn.alive)return;let h={x:sn.body[0].x+sn.dir.x,y:sn.body[0].y+sn.dir.y};if(!walls[diffSel.value]){h.x=(h.x+N)%N;h.y=(h.y+N)%N}nextHeads.set(sn,h)});
    snake.forEach(sn=>{if(!sn.alive)return;const h=nextHeads.get(sn);if(walls[diffSel.value]&&(h.x<0||h.x>=N||h.y<0||h.y>=N)){sn.alive=false;return}if(hitBody(h,sn))sn.alive=false;});
    if(snake.length>1&&snake[0].alive&&snake[1].alive&&same(nextHeads.get(snake[0]),nextHeads.get(snake[1]))){snake[0].alive=false;snake[1].alive=false;}
    snake.forEach(sn=>{if(!sn.alive)return;const h=nextHeads.get(sn);sn.body.unshift(h);if(same(h,food)){sn.score++;sn.grow+=2;spawnFood()} if(sn.grow>0)sn.grow--;else sn.body.pop();});
    update(); draw(); checkEnd();
  }
  function hitBody(p,self){for(const sn of snake){const arr=(sn===self)?sn.body.slice(0,-1):sn.body;if(arr.some(x=>same(x,p)))return true}return false}
  function same(a,b){return a&&b&&a.x===b.x&&a.y===b.y}
  function spawnFood(){let free=[];for(let y=0;y<N;y++)for(let x=0;x<N;x++)if(!snake.some(sn=>sn.body.some(p=>p.x===x&&p.y===y)))free.push({x,y});food=free[Math.floor(Math.random()*free.length)]||{x:12,y:12};}
  function update(){s1.textContent=snake[0]?.score||0;s2.textContent=snake[1]?.score||0;const top=Math.max(0,...snake.map(s=>s.score));if(top>best){best=top;safeSet('snake_best',best);bestEl.textContent=best}}
  function checkEnd(){if(mode==='single'){if(!snake[0].alive)end('Game Over','Du hast '+snake[0].score+' Punkte erreicht.');return}const alive=snake.filter(s=>s.alive);if(alive.length<=1){if(alive.length===1)end(alive[0].name+' gewinnt!',snake.map(s=>s.name+': '+s.score).join(' · '));else{let a=snake[0],b=snake[1];end(a.score===b.score?'Unentschieden':(a.score>b.score?a.name:b.name)+' gewinnt!',a.name+': '+a.score+' · '+b.name+': '+b.score)}}}
  function end(t,txt){running=false;clearInterval(timer);overTitle.textContent=t;overText.textContent=txt;over.classList.remove('hide');status.textContent='Spiel beendet';}

  function botMove(sn){const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}].filter(d=>!reverse(sn.dir,d)&&safe(sn,d));if(!dirs.length)return;if(Math.random()<botError[diffSel.value]){sn.next=dirs[Math.floor(Math.random()*dirs.length)];return}dirs.sort((a,b)=>dist(step(sn,a),food)-dist(step(sn,b),food));sn.next=dirs[0];}
  function step(sn,d){let p={x:sn.body[0].x+d.x,y:sn.body[0].y+d.y};if(!walls[diffSel.value]){p.x=(p.x+N)%N;p.y=(p.y+N)%N}return p}
  function safe(sn,d){let p=step(sn,d);if(walls[diffSel.value]&&(p.x<0||p.x>=N||p.y<0||p.y>=N))return false;return !hitBody(p,sn)}
  function dist(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)}
  function reverse(a,b){return a.x+b.x===0&&a.y+b.y===0}

  function setDir(sn,d){if(!sn||!sn.alive||reverse(sn.dir,d))return;sn.next=d}
  document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d',' '].includes(k))e.preventDefault();if(k===' '&&running){paused=!paused;status.textContent=paused?'Pause':labelMode()+' · '+labelDiff();draw();return}if(k==='arrowup')setDir(snake[0],{x:0,y:-1});if(k==='arrowdown')setDir(snake[0],{x:0,y:1});if(k==='arrowleft')setDir(snake[0],{x:-1,y:0});if(k==='arrowright')setDir(snake[0],{x:1,y:0});if(mode==='multi'){if(k==='w')setDir(snake[1],{x:0,y:-1});if(k==='s')setDir(snake[1],{x:0,y:1});if(k==='a')setDir(snake[1],{x:-1,y:0});if(k==='d')setDir(snake[1],{x:1,y:0});}});
  document.querySelectorAll('.dir').forEach(b=>b.onclick=()=>{let d=b.dataset.d;if(d==='up')setDir(snake[0],{x:0,y:-1});if(d==='down')setDir(snake[0],{x:0,y:1});if(d==='left')setDir(snake[0],{x:-1,y:0});if(d==='right')setDir(snake[0],{x:1,y:0});});
  let touch=null;canvas.addEventListener('pointerdown',e=>{touch={x:e.clientX,y:e.clientY}});canvas.addEventListener('pointerup',e=>{if(!touch)return;let dx=e.clientX-touch.x,dy=e.clientY-touch.y;if(Math.max(Math.abs(dx),Math.abs(dy))>25){if(Math.abs(dx)>Math.abs(dy))setDir(snake[0],{x:Math.sign(dx),y:0});else setDir(snake[0],{x:0,y:Math.sign(dy)})}touch=null});

  function draw(){ctx.clearRect(0,0,720,720);ctx.fillStyle='#08150d';ctx.fillRect(0,0,720,720);ctx.strokeStyle='#ffffff12';for(let i=1;i<N;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,720);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(720,i*CELL);ctx.stroke()}drawFood();snake.forEach(drawSnake);if(paused){ctx.fillStyle='#0009';ctx.fillRect(0,0,720,720);ctx.fillStyle='white';ctx.font='900 64px system-ui';ctx.textAlign='center';ctx.fillText('Pause',360,370)}}
  function drawFood(){let x=food.x*CELL+CELL/2,y=food.y*CELL+CELL/2;ctx.shadowBlur=20;ctx.shadowColor='#ff4d6d';ctx.fillStyle='#ff4d6d';ctx.beginPath();ctx.arc(x,y,CELL*.35,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(x-5,y-6,4,0,Math.PI*2);ctx.fill()}
  function drawSnake(sn){sn.body.forEach((p,i)=>{ctx.shadowBlur=i?6:18;ctx.shadowColor=sn.color;ctx.fillStyle=sn.alive?(i?sn.color:sn.head):'#888';round(p.x*CELL+3,p.y*CELL+3,CELL-6,CELL-6,8);ctx.fill();ctx.shadowBlur=0;if(i===0&&sn.alive){ctx.fillStyle='#031008';ctx.beginPath();ctx.arc(p.x*CELL+CELL*.35,p.y*CELL+CELL*.38,2.8,0,Math.PI*2);ctx.arc(p.x*CELL+CELL*.65,p.y*CELL+CELL*.38,2.8,0,Math.PI*2);ctx.fill()}})}
  function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
  reset();
})();
</script>
</body>
</html>
