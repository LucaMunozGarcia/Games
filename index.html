<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GameHub</title>
  <style>
    :root {
      --bg: #070816;
      --surface: rgba(18, 22, 43, 0.82);
      --surface-2: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #aeb8d6;
      --accent: #7c5cff;
      --accent-2: #00d4ff;
      --line: rgba(255, 255, 255, 0.12);
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(124, 92, 255, 0.45), transparent 32rem),
        radial-gradient(circle at 88% 12%, rgba(0, 212, 255, 0.23), transparent 30rem),
        radial-gradient(circle at 50% 110%, rgba(255, 77, 148, 0.18), transparent 34rem),
        var(--bg);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
    }

    button, input { font: inherit; }

    .page {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 54px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(7, 8, 22, 0.58);
      backdrop-filter: blur(20px);
      box-shadow: 0 14px 55px rgba(0,0,0,.24);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      font-weight: 950;
      letter-spacing: -0.04em;
      font-size: 1.15rem;
    }

    .logo {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 30px rgba(0, 212, 255, .34);
    }

    .nav {
      display: flex;
      gap: 10px;
      color: var(--muted);
      font-weight: 800;
      font-size: .92rem;
    }

    .nav a {
      color: inherit;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
      transition: background .18s ease, color .18s ease;
    }

    .nav a:hover, .nav a.active {
      color: white;
      background: rgba(255,255,255,.10);
    }

    .hero {
      position: relative;
      overflow: hidden;
      min-height: 380px;
      display: grid;
      align-items: end;
      padding: clamp(26px, 5vw, 54px);
      border: 1px solid var(--line);
      border-radius: 36px;
      background:
        linear-gradient(90deg, rgba(7,8,22,.92) 0%, rgba(7,8,22,.70) 46%, rgba(7,8,22,.15) 100%),
        radial-gradient(circle at 72% 30%, rgba(124,92,255,.72), transparent 18rem),
        radial-gradient(circle at 84% 70%, rgba(0,212,255,.56), transparent 16rem),
        linear-gradient(135deg, #181f46, #0b1024 58%, #1c1042);
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "🎮";
      position: absolute;
      right: clamp(18px, 8vw, 90px);
      top: 50%;
      transform: translateY(-50%) rotate(-10deg);
      font-size: clamp(7rem, 20vw, 16rem);
      filter: drop-shadow(0 30px 50px rgba(0,0,0,.42));
      opacity: .92;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 660px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 9px 13px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      color: #dfe7ff;
      background: rgba(255,255,255,.09);
      font-weight: 900;
      font-size: .88rem;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(2.8rem, 8vw, 6.8rem);
      line-height: .9;
      letter-spacing: -0.075em;
    }

    .hero p {
      margin: 20px 0 0;
      color: #d1daf7;
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.65;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 46px;
      padding: 12px 18px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      color: white;
      text-decoration: none;
      font-weight: 950;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 16px 34px rgba(124,92,255,.30);
      transition: transform .18s ease, filter .18s ease;
    }

    .btn:hover { transform: translateY(-2px); filter: brightness(1.07); }

    .btn.secondary {
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: none;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin: 34px 0 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.35rem);
      letter-spacing: -0.045em;
    }

    .section-head span { color: var(--muted); font-weight: 800; }

    .search {
      position: relative;
      width: min(360px, 100%);
      flex: 0 1 360px;
    }

    .search input {
      width: 100%;
      min-height: 48px;
      padding: 0 16px 0 46px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      outline: none;
      color: white;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(16px);
    }

    .search input:focus { border-color: rgba(0,212,255,.55); }
    .search input::placeholder { color: rgba(174,184,214,.78); }

    .search svg {
      position: absolute;
      left: 17px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(238px, 1fr));
      gap: 18px;
    }

    .game-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: 0 20px 58px rgba(0,0,0,.30);
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .game-card:hover {
      transform: translateY(-7px);
      border-color: rgba(0,212,255,.45);
      box-shadow: 0 30px 80px rgba(0,0,0,.42);
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: linear-gradient(135deg, #202956, #111735);
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .25s ease;
    }

    .game-card:hover .thumb-wrap img { transform: scale(1.07); }

    .thumb-fallback {
      width: 100%;
      height: 100%;
      display: none;
      place-items: center;
      font-size: 4rem;
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,.28), transparent 28%),
        linear-gradient(135deg, #7c5cff, #00d4ff);
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      background: rgba(0,0,0,.34);
      transition: opacity .2s ease;
    }

    .game-card:hover .play-overlay { opacity: 1; }

    .play-icon {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,.92);
      color: #111735;
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
      font-size: 1.4rem;
      transform: translateX(2px);
    }

    .card-body { padding: 16px; }

    .game-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .game-title h3 {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 1.08rem;
      letter-spacing: -0.025em;
    }

    .tag {
      flex: 0 0 auto;
      padding: 6px 9px;
      border-radius: 999px;
      color: #dbe5ff;
      background: rgba(255,255,255,.09);
      font-size: .76rem;
      font-weight: 950;
    }

    .card-actions { display: grid; grid-template-columns: 1fr; }

    .play-button { width: 100%; }

    .empty {
      display: none;
      padding: 36px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,.06);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      padding: 18px;
      background: rgba(3, 5, 14, .86);
      backdrop-filter: blur(14px);
    }

    .modal.open { display: grid; }

    .player {
      width: min(1320px, 100%);
      height: min(860px, calc(100vh - 36px));
      margin: auto;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 24px;
      background: #050713;
      box-shadow: var(--shadow);
    }

    .player-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      background: rgba(255,255,255,.08);
      border-bottom: 1px solid rgba(255,255,255,.10);
    }

    .player-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 950;
      letter-spacing: -0.02em;
    }

    .player-tools {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    footer {
      margin-top: 34px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .topbar { border-radius: 24px; align-items: flex-start; }
      .nav { display: none; }
      .hero { min-height: 420px; }
      .hero::after { opacity: .30; right: -12px; }
      .section-head { align-items: stretch; flex-direction: column; }
      .search { width: 100%; flex-basis: auto; }
      .player-tools .secondary { display: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="topbar" aria-label="Navigation">
      <div class="brand">
        <div class="logo" aria-hidden="true">🎮</div>
        <span>GameHub</span>
      </div>
      <div class="nav">
        <a class="active" href="#games">Spiele</a>
        <a href="#new">Neu</a>
        <a href="#popular">Beliebt</a>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-content">
        <div class="badge">Jetzt spielen</div>
        <h1>Deine Games an einem Ort.</h1>
        <p>Wähle ein Spiel aus, starte es direkt im Browser und spiele sofort los.</p>
        <div class="hero-actions">
          <a class="btn" href="#games">Spiele entdecken</a>
          <button id="randomGame" class="btn secondary" type="button">Zufälliges Spiel</button>
        </div>
      </div>
    </section>

    <section id="games" class="section-head">
      <div>
        <h2>Alle Spiele</h2>
        <span id="gameCount">0 Spiele verfügbar</span>
      </div>
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.35-4.35m2.35-5.15a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <input id="searchInput" type="search" placeholder="Spiel suchen" autocomplete="off" />
      </label>
    </section>

    <section id="gameGrid" class="grid" aria-live="polite"></section>
    <section id="emptyState" class="empty">Kein Spiel gefunden.</section>

    <footer>Viel Spaß beim Spielen!</footer>
  </main>

  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-label="Spiel">
    <div class="player">
      <div class="player-bar">
        <div id="playerTitle" class="player-title">Spiel</div>
        <div class="player-tools">
          <a id="openNewTab" class="btn secondary" target="_blank" rel="noopener">Vollbild</a>
          <button id="closePlayer" class="btn" type="button">Schließen</button>
        </div>
      </div>
      <iframe id="gameFrame" title="Spiel"></iframe>
    </div>
  </div>

  <script>
    const gameFolders = [
      "Beispielspiel"
    ];

    const grid = document.getElementById("gameGrid");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const gameCount = document.getElementById("gameCount");
    const randomGame = document.getElementById("randomGame");
    const modal = document.getElementById("modal");
    const gameFrame = document.getElementById("gameFrame");
    const playerTitle = document.getElementById("playerTitle");
    const closePlayer = document.getElementById("closePlayer");
    const openNewTab = document.getElementById("openNewTab");

    const games = gameFolders.map(folder => ({
      folder,
      title: folder.replaceAll("-", " ").replaceAll("_", " "),
      url: `Games/${encodeURIComponent(folder)}/main.html`,
      thumbnail: `Games/${encodeURIComponent(folder)}/thumbnail.png`
    }));

    function renderGames(filter = "") {
      const term = filter.trim().toLowerCase();
      const filteredGames = games.filter(game => game.title.toLowerCase().includes(term));

      gameCount.textContent = `${games.length} ${games.length === 1 ? "Spiel" : "Spiele"} verfügbar`;
      grid.innerHTML = "";
      emptyState.style.display = filteredGames.length ? "none" : "block";

      filteredGames.forEach(game => {
        const card = document.createElement("article");
        card.className = "game-card";
        card.innerHTML = `
          <div class="thumb-wrap">
            <img src="${game.thumbnail}" alt="${escapeHtml(game.title)}" loading="lazy">
            <div class="thumb-fallback" aria-hidden="true">🎮</div>
            <div class="play-overlay" aria-hidden="true"><div class="play-icon">▶</div></div>
          </div>
          <div class="card-body">
            <div class="game-title">
              <h3>${escapeHtml(game.title)}</h3>
              <span class="tag">Game</span>
            </div>
            <div class="card-actions">
              <button class="btn play-button" type="button">Spielen</button>
            </div>
          </div>
        `;

        const image = card.querySelector("img");
        const fallback = card.querySelector(".thumb-fallback");
        image.addEventListener("error", () => {
          image.style.display = "none";
          fallback.style.display = "grid";
        });

        card.querySelector(".play-button").addEventListener("click", () => openGame(game));
        card.querySelector(".thumb-wrap").addEventListener("click", () => openGame(game));
        grid.appendChild(card);
      });
    }

    function openGame(game) {
      playerTitle.textContent = game.title;
      openNewTab.href = game.url;
      gameFrame.src = game.url;
      modal.classList.add("open");
    }

    function closeGame() {
      modal.classList.remove("open");
      gameFrame.src = "about:blank";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    searchInput.addEventListener("input", event => renderGames(event.target.value));
    closePlayer.addEventListener("click", closeGame);
    randomGame.addEventListener("click", () => {
      if (!games.length) return;
      openGame(games[Math.floor(Math.random() * games.length)]);
    });
    modal.addEventListener("click", event => {
      if (event.target === modal) closeGame();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && modal.classList.contains("open")) closeGame();
    });

    renderGames();
  </script>
</body>
</html>
